services:
  - type: web
    name: skillsphere-backend
    env: node
    buildCommand: npm install
    startCommand: npm run start
    envVars:
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: EMAIL_USER
        sync: false
      - key: EMAIL_PASS
        sync: false
      - key: CLIENT_URL
        sync: false
      - key: PORT
        value: "5000"
    autoDeploy: true
    repo: https://github.com/Geeta1923/Skillsphere
    branch: main
    rootDir: backend
    healthCheckPath: /
